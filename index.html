<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameNews — портал игровых новостей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --bg-dark: #0f0f1a;
            --bg-card: #1e1e2a;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #ec4899;
            --shadow: 0 20px 25px -12px rgba(0,0,0,0.5);
            --transition: all 0.25s ease;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }

        .nav {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .logo::before {
            content: '🎮';
            margin-right: 8px;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, #1e1e2a 0%, #2d2d3a 100%);
            border-radius: 2rem;
            margin-bottom: 3rem;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .section-title {
            font-size: 2rem;
            margin: 2rem 0 1.5rem 0;
            border-left: 5px solid var(--primary);
            padding-left: 1rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .news-card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .news-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .news-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .news-content {
            padding: 1.5rem;
        }

        .news-category {
            display: inline-block;
            background: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 0.75rem;
        }

        .news-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
        }

        .news-card p {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .read-more {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-block;
        }

        .read-more:hover {
            color: var(--accent);
        }

        .games-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin: 2rem 0 3rem;
        }

        .game-item {
            flex: 1;
            min-width: 150px;
            background: var(--bg-card);
            padding: 1.5rem;
            text-align: center;
            border-radius: 1.5rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .game-item:hover {
            background: var(--primary);
            transform: scale(1.05);
        }

        .game-item span {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .form-card {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 2rem;
            margin: 2rem 0;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #2d2d3a;
            border: 2px solid #3d3d4a;
            border-radius: 1rem;
            color: var(--text);
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            background: var(--primary-dark);
        }

        .pages-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: 1.5rem;
        }

        .page-btn {
            background: #2d2d3a;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .page-btn:hover {
            background: var(--primary);
        }

        .go-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .go-top:hover {
            background: var(--accent);
            transform: scale(1.1);
        }

        footer {
            text-align: center;
            padding: 2rem;
            background: #0a0a10;
            margin-top: 3rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            margin: 0 0.5rem;
        }

        footer a:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <nav class="nav">
        <div class="logo" onclick="changePage('home')">GameNews</div>
        <ul class="nav-links">
            <li><a onclick="changePage('home')">Главная</a></li>
            <li><a onclick="changePage('news')">Новости</a></li>
            <li><a onclick="changePage('reviews')">Обзоры</a></li>
            <li><a onclick="changePage('guides')">Гайды</a></li>
            <li><a href="https://stopgame.ru" target="_blank">StopGame</a></li>
            <li><a href="https://www.igromania.ru" target="_blank">Игромания</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="container" id="mainContent">
        <!-- Контент будет загружаться сюда через JS -->
    </div>
</main>

<a class="go-top" onclick="scrollToTop()">↑</a>

<footer>
    <p>© 2025 GameNews — портал игровых новостей</p>
    <p>
        <a href="https://www.ign.com" target="_blank">IGN</a> | 
        <a href="https://www.gamespot.com" target="_blank">GameSpot</a> | 
        <a href="https://dtf.ru" target="_blank">DTF</a> |
        <a href="https://www.youtube.com/results?search_query=игровые+новости" target="_blank">YouTube</a>
    </p>
</footer>

<script>
    const contentDB = {
        home: `
            <section class="hero">
                <h1>GameNews — всё о мире игр</h1>
                <p>GTA 6, новый Cyberpunk, Xbox Showcase и всё самое горячее из мира игр</p>
            </section>

            <div class="pages-links">
                <button class="page-btn" onclick="changePage('news')">Все новости</button>
                <button class="page-btn" onclick="changePage('reviews')">Обзоры игр</button>
                <button class="page-btn" onclick="changePage('guides')">Гайды</button>
                <button class="page-btn" onclick="window.open('https://www.youtube.com/results?search_query=игровые+новости', '_blank')">YouTube-новости</button>
            </div>

            <h2 class="section-title">Популярные игры недели</h2>
            <div class="games-flex">
                <div class="game-item" onclick="window.open('https://www.rockstargames.com/ru/', '_blank')"><span>🎮</span> GTA VI</div>
                <div class="game-item" onclick="window.open('https://en.bandainamcoent.eu/elden-ring', '_blank')"><span>⚔️</span> Elden Ring</div>
                <div class="game-item" onclick="window.open('https://www.cyberpunk.net/ru/ru/', '_blank')"><span>🤖</span> Cyberpunk 2077</div>
                <div class="game-item" onclick="window.open('https://www.callofduty.com/ru', '_blank')"><span>🔫</span> Call of Duty</div>
                <div class="game-item" onclick="window.open('https://www.hogwartslegacy.com/ru-ru', '_blank')"><span>🧙</span> Hogwarts Legacy</div>
            </div>

            <div class="form-card">
                <h2 class="section-title" style="margin-top: 0;">Подпишись на новости</h2>
                <form id="subscribeForm" onsubmit="handleSubscribe(event)">
                    <div class="form-group">
                        <label for="name">Имя</label>
                        <input type="text" id="name" placeholder="Твой ник" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="gamer@mail.ru" required>
                    </div>
                    <button type="submit">Подписаться</button>
                </form>
            </div>
        `,

        news: `
            <h2 class="section-title">Последние новости</h2>
            <div class="news-grid">
                <article class="news-card">
                    <img class="news-img" src="https://cdn2.steamgriddb.com/thumb/af0dcdcc721b26d894abeb811dc434d8.jpg" alt="GTA 6">
                    <div class="news-content">
                        <span class="news-category">Трейлеры</span>
                        <h3>GTA VI: новый трейлер набрал 100 млн просмотров</h3>
                        <p>Rockstar показала новый геймплей. Релиз ожидается в 2025.</p>
                        <a href="https://www.rockstargames.com/ru/" target="_blank" class="read-more">Читать далее →</a>
                    </div>
                </article>
                <article class="news-card">
                    <img class="news-img" src="https://cdn2.steamgriddb.com/thumb/6f177be0be3e303ff9a7d1b82246ebbc.jpg" alt="Cyberpunk">
                    <div class="news-content">
                        <span class="news-category">Обновления</span>
                        <h3>Cyberpunk 2077: анонсировано крупное DLC</h3>
                        <p>Новая история в районе Пасифика. Бесплатно для всех.</p>
                        <a href="https://www.cyberpunk.net/ru/ru/" target="_blank" class="read-more">Читать далее →</a>
                    </div>
                </article>
                <article class="news-card">
                    <img class="news-img" src="https://cdn2.steamgriddb.com/thumb/6b2b0b3b2e6a2e9e6f2b6e3c8f1d3c7a.jpg" alt="Xbox">
                    <div class="news-content">
                        <span class="news-category">Ивенты</span>
                        <h3>Xbox Showcase 2025: Fable и новый Doom</h3>
                        <p>Microsoft провела грандиозную презентацию.</p>
                        <a href="https://news.xbox.com/ru-ru/" target="_blank" class="read-more">Читать далее →</a>
                    </div>
                </article>
                <article class="news-card">
                    <img class="news-img" src="https://cdn2.steamgriddb.com/thumb/7b3e6a2e9e6f2b6b0b3b2e6a2e9e6f2b.jpg" alt="PlayStation">
                    <div class="news-content">
                        <span class="news-category">PlayStation</span>
                        <h3>Sony State of Play: ремастер The Last of Us 2</h3>
                        <p>Эксклюзивы для PS5, улучшенная графика.</p>
                        <a href="https://www.playstation.com/ru-ru/" target="_blank" class="read-more">Читать далее →</a>
                    </div>
                </article>
                <article class="news-card">
                    <img class="news-img" src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1245620/header.jpg" alt="Elden Ring">
                    <div class="news-content">
                        <span class="news-category">Релизы</span>
                        <h3>Elden Ring: Shadow of the Erdtree — дата выхода</h3>
                        <p>Новые боссы, локации и сюжетная арка.</p>
                        <a href="https://en.bandainamcoent.eu/elden-ring" target="_blank" class="read-more">Читать далее →</a>
                    </div>
                </article>
                <article class="news-card">
                    <img class="news-img" src="https://cdn2.steamgriddb.com/thumb/8f1d3c7a6b2b0b3b2e6a2e9e6f2b6b0b.jpg" alt="Steam Deck">
                    <div class="news-content">
                        <span class="news-category">Железо</span>
                        <h3>Valve анонсировала Steam Deck 2</h3>
                        <p>Больше батареи, OLED и новый процессор.</p>
                        <a href="https://www.steamdeck.com/ru/" target="_blank" class="read-more">Читать далее →</a>
                    </div>
                </article>
            </div>
        `,

        reviews: `
            <h2 class="section-title">Свежие обзоры</h2>
            <div class="news-grid">
                <article class="news-card">
                    <img class="news-img" src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1888160/header.jpg" alt="Alan Wake 2">
                    <div class="news-content">
                        <span class="news-category">Обзор</span>
                        <h3>Alan Wake 2: хоррор года — 9.5/10</h3>
                        <p>Мрачная атмосфера, сюжетные твисты и отличная графика.</p>
                        <a href="https://www.igromania.ru/" target="_blank" class="read-more">Читать обзор →</a>
                    </div>
                </article>
                <article class="news-card">
                    <img class="news-img" src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1716740/header.jpg" alt="Starfield">
                    <div class="news-content">
                        <span class="news-category">Обзор</span>
                        <h3>Starfield — стоит ли играть в 2025?</h3>
                        <p>Моды исправили баги, космос зовёт снова.</p>
                        <a href="https://bethesda.net/ru/game/starfield" target="_blank" class="read-more">Читать обзор →</a>
                    </div>
                </article>
                <article class="news-card">
                    <img class="news-img" src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1086940/header.jpg" alt="Baldur's Gate 3">
                    <div class="news-content">
                        <span class="news-category">Обзор</span>
                        <h3>Baldur's Gate 3: почему это RPG года</h3>
                        <p>Свобода выбора, глубокий сюжет и отличная боевка.</p>
                        <a href="https://baldursgate3.game/" target="_blank" class="read-more">Читать обзор →</a>
                    </div>
                </article>
            </div>
        `,

        guides: `
            <h2 class="section-title">Гайды и советы</h2>
            <div class="news-grid">
                <article class="news-card">
                    <img class="news-img" src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1245620/header.jpg" alt="Elden Ring Guide">
                    <div class="news-content">
                        <span class="news-category">Гайд</span>
                        <h3>Elden Ring: лучший билд для новичков</h3>
                        <p>Как пройти первых боссов без стресса.</p>
                        <a href="#" class="read-more" onclick="showGuideMessage()">Читать гайд →</a>
                    </div>
                </article>
                <article class="news-card">
                    <img class="news-img" src="https://cdn2.steamgriddb.com/thumb/6f177be0be3e303ff9a7d1b82246ebbc.jpg" alt="Cyberpunk Guide">
                    <div class="news-content">
                        <span class="news-category">Гайд</span>
                        <h3>Cyberpunk 2077: как разбогатеть в начале</h3>
                        <p>Секретные места с деньгами и легендарным лутом.</p>
                        <a href="#" class="read-more" onclick="showGuideMessage()">Читать гайд →</a>
                    </div>
                </article>
            </div>
        `
    };

    function changePage(page) {
        const contentDiv = document.getElementById('mainContent');
        if (contentDB[page]) {
            contentDiv.innerHTML = contentDB[page];
        } else {
            contentDiv.innerHTML = contentDB['home'];
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleSubscribe(event) {
        event.preventDefault();
        const name = document.getElementById('name')?.value || 'Геймер';
        alert(`Спасибо, ${name}! Ты подписан на игровые новости.`);
        document.getElementById('subscribeForm')?.reset();
    }

    function showGuideMessage() {
        alert('Полный гайд доступен в нашей Telegram-группе! Скоро добавим.');
    }

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    changePage('home');
</script>
</body>
</html>
